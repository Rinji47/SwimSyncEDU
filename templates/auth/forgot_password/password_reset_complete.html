{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete - SwimSync EDU{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>Password Updated</h1>
            <p>Your password has been reset successfully. You can sign in now.</p>
        </div>

        <div class="auth-footer">
            <p><a href="{% url 'login' %}" class="link">Go to login</a></p>
        </div>
    </div>
</div>
{% endblock %}
